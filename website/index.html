<!DOCTYPE html>
<html>
<head>
    <title>Abdulrahman Almohaimeed - Cloud Architect</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #ffffff; text-align: center; padding: 50px; }
        h1 { color: #0078d4; }
    </style>
</head>
<body>
    <h1>Abdulrahman Almohaimeed</h1>
    <h2>Cloud Infrastructure Architect | Computer Engineer</h2>
    
    <p>Visitor Count: <span id="counter">Loading...</span></p>
    
    <p>Live from Azure Terraform Infrastructure.</p>

    <script>
        // Fetch the count from your serverless Container App API
        // REPLACE THE URL BELOW WITH YOUR ACTUAL CONTAINER APP FQDN
        fetch('https://amresume-api-001--0000001.bravewave-530d880e.eastus.azurecontainerapps.io/api/count')
            .then(response => response.json())
            .then(data => {
                // Update the HTML span with the number from the database
                document.getElementById('counter').innerText = data.count;
            })
            .catch(error => {
                console.error('Error fetching visitor count:', error);
                document.getElementById('counter').innerText = 'Error loading count';
            });
    </script>
</body>
</html>
