name: Deploy Azure Resume

# Trigger this pipeline every time you push to the main branch
on:
  push:
    branches:
      - main

# Set up the credentials Terraform needs to authenticate
env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Security Stage
      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .  # Scan the entire repository for Terraform files
          framework: terraform
          quiet: true  # Suppress output unless there are issues
          # soft_fail: true  # Optional: Don't fail the pipeline on security issues, just report them

      # 3. FINOPS Stage
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost Report
        run: |
          infracost breakdown --path . --format table --out-file /tmp/infracost.txt
          cat /tmp/infracost.txt

      # 4. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      # 5. Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # 6. Apply Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # 7. Log into Azure CLI using your stored secret
      - name: Azure Login
        id: azure_login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        
      # --- JIT CLOUDFLARE BYPASS ---
      - name: Drop Cloudflare Shield (Grey Cloud)
        run: |
          echo "Temporarily disabling Cloudflare proxy for Azure validation..."
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${{ secrets.CF_RECORD_ID }}" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"proxied":false}'
          
          echo "Waiting 60 seconds for DNS propagation..."
          sleep 60

      - name: Open Firewall
        run: |
          az storage account update \
            --resource-group rg-portfolio-prod \
            --name amsecuredstore001 \
            --default-action Allow
          
          echo "Waiting 30 seconds for Azure firewall rules to propagate..."
          sleep 30

      - name: Upload Website to Blob Storage
        run: |
          az storage blob upload-batch \
            --source ./website \
            --destination '$web' \
            --account-name amsecuredstore001 \
            --auth-mode login \
            --overwrite

      # --- JIT RESTORATION (FIREWALL & CLOUDFLARE) ---
      - name: Close Firewall & Restore Cloudflare
        if: always() && steps.azure_login.conclusion == 'success'
        run: |
          echo "Restoring Azure Zero Trust Perimeter..."
          az storage account update \
            --resource-group rg-portfolio-prod \
            --name amsecuredstore001 \
            --default-action Deny
            
          echo "Restoring Cloudflare Proxy Shield (Orange Cloud)..."
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/${{ secrets.CF_RECORD_ID }}" \
               -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"proxied":true}'