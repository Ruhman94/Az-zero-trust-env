name: Deploy Azure Resume

# Trigger this pipeline every time you push to the main branch
on:
  push:
    branches:
      - main

# Set up the credentials Terraform needs to authenticate
env:
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      # 3. Initialize Terraform
      - name: Terraform Init
        run: terraform init

      # 4. Apply Terraform
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # 5. Log into Azure CLI using your stored secret
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 6. Get the current IP of the GitHub runner
      - name: Get GitHub Runner IP
        id: ip
        uses: haythem/public-ip@v1.3

      # 7. Temporarily add the runner IP to the Azure Storage firewall
      - name: Whitelist Runner IP
        run: |
          az storage account network-rule add \
            --resource-group YOUR_RESOURCE_GROUP_NAME \
            --account-name amsecuredstore001 \
            --ip-address ${{ steps.ip.outputs.ipv4 }}
          
          echo "Waiting 30 seconds for Azure firewall rules to propagate globally..."
          sleep 30

      # 8. Upload your website files to the Storage Account
      - name: Upload Website to Blob Storage
        run: |
          az storage blob upload-batch \
            --source ./website \
            --destination '$web' \
            --account-name amsecuredstore001 \
            --auth-mode login \
            --overwrite

      # 9. Remove the IP from the firewall (Runs even if the upload fails)
      - name: Revoke Runner IP Access
        if: always() && steps.ip.outcome == 'success'
        run: |
          az storage account network-rule remove \
            --resource-group YOUR_RESOURCE_GROUP_NAME \
            --account-name amsecuredstore001 \
            --ip-address ${{ steps.ip.outputs.ipv4 }}